version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: zedu_user
      POSTGRES_PASSWORD: zedu_password
      POSTGRES_DB: zedu
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zedu_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://zedu_user:zedu_password@postgres:5432/zedu
      FLASK_ENV: development
      SECRET_KEY: dev-key-change-in-production
      JWT_SECRET_KEY: dev-jwt-key-change-in-production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python app.py

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - API_URL=http://backend:5000/api
    depends_on:
      - backend

volumes:
  postgres_data:
