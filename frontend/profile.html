<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ZEDU</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-graduation-cap"></i> ZEDU
            </a>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-body text-center">
                        <div class="avatar mb-3" style="width: 100px; height: 100px; margin: 0 auto; border-radius: 50%; background-color: #0d6efd; color: white; display: flex; align-items: center; justify-content: center; font-size: 48px;">
                            <i class="fas fa-user"></i>
                        </div>
                        <h5 id="profileName" class="card-title">User Name</h5>
                        <p id="profileType" class="text-muted">Student</p>
                        <hr>
                        <p id="profileEmail" class="text-muted small">user@example.com</p>
                        <p id="profilePhone" class="text-muted small">Not provided</p>
                        <div class="d-grid gap-2">
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                                <i class="fas fa-edit"></i> Edit Profile
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <!-- Profile Tabs -->
                <div class="card shadow">
                    <div class="card-header">
                        <ul class="nav nav-tabs card-header-tabs" role="tablist">
                            <li class="nav-item">
                                <a class="nav-link active" data-bs-toggle="tab" href="#personal">Personal</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#security">Security</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" data-bs-toggle="tab" href="#preferences">Preferences</a>
                            </li>
                        </ul>
                    </div>
                    <div class="card-body">
                        <div class="tab-content">
                            <!-- Personal Tab -->
                            <div class="tab-pane fade show active" id="personal">
                                <h5 class="mb-3">Personal Information</h5>
                                <div class="row mb-3">
                                    <label class="col-sm-3 col-form-label">First Name</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control" id="firstName" readonly>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-sm-3 col-form-label">Last Name</label>
                                    <div class="col-sm-9">
                                        <input type="text" class="form-control" id="lastName" readonly>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-sm-3 col-form-label">Email</label>
                                    <div class="col-sm-9">
                                        <input type="email" class="form-control" id="email" readonly>
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-sm-3 col-form-label">Phone</label>
                                    <div class="col-sm-9">
                                        <input type="tel" class="form-control" id="phone">
                                    </div>
                                </div>
                                <div class="row mb-3">
                                    <label class="col-sm-3 col-form-label">Bio</label>
                                    <div class="col-sm-9">
                                        <textarea class="form-control" id="bio" rows="4" placeholder="Tell us about yourself"></textarea>
                                    </div>
                                </div>
                                <button class="btn btn-primary" onclick="updateProfile()">
                                    <i class="fas fa-save"></i> Save Changes
                                </button>
                            </div>

                            <!-- Security Tab -->
                            <div class="tab-pane fade" id="security">
                                <h5 class="mb-3">Security Settings</h5>
                                <div class="card bg-light mb-3">
                                    <div class="card-body">
                                        <h6>Change Password</h6>
                                        <p class="text-muted">Update your password regularly to keep your account secure</p>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="oldPassword" class="form-label">Current Password</label>
                                    <input type="password" class="form-control" id="oldPassword">
                                </div>
                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">New Password</label>
                                    <input type="password" class="form-control" id="newPassword">
                                </div>
                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword">
                                </div>
                                <button class="btn btn-warning" onclick="changePassword()">
                                    <i class="fas fa-lock"></i> Change Password
                                </button>
                            </div>

                            <!-- Preferences Tab -->
                            <div class="tab-pane fade" id="preferences">
                                <h5 class="mb-3">Preferences</h5>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="emailNotifications" checked>
                                        <label class="form-check-label" for="emailNotifications">
                                            Email Notifications
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="pushNotifications" checked>
                                        <label class="form-check-label" for="pushNotifications">
                                            Push Notifications
                                        </label>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox" id="darkMode">
                                        <label class="form-check-label" for="darkMode">
                                            Dark Mode
                                        </label>
                                    </div>
                                </div>
                                <button class="btn btn-primary" onclick="savePreferences()">
                                    <i class="fas fa-save"></i> Save Preferences
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label for="editFirstName" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="editFirstName">
                        </div>
                        <div class="mb-3">
                            <label for="editLastName" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="editLastName">
                        </div>
                        <div class="mb-3">
                            <label for="editPhone" class="form-label">Phone</label>
                            <input type="tel" class="form-control" id="editPhone">
                        </div>
                        <div class="mb-3">
                            <label for="editBio" class="form-label">Bio</label>
                            <textarea class="form-control" id="editBio" rows="4"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal" onclick="saveProfileChanges()">
                        Save Changes
                    </button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white mt-5 py-4">
        <div class="container text-center">
            <p>&copy; 2026 ZEDU Educational Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-client.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Load profile
        async function loadProfile() {
            requireAuth();
            const user = Storage.get('user');
            if (user) {
                document.getElementById('profileName').textContent = formatName(user.first_name, user.last_name);
                document.getElementById('profileType').textContent = user.user_type.charAt(0).toUpperCase() + user.user_type.slice(1);
                document.getElementById('profileEmail').textContent = user.email;
                document.getElementById('profilePhone').textContent = user.phone || 'Not provided';
                
                document.getElementById('firstName').value = user.first_name;
                document.getElementById('lastName').value = user.last_name;
                document.getElementById('email').value = user.email;
                document.getElementById('phone').value = user.phone || '';
            }
        }

        async function updateProfile() {
            const phone = document.getElementById('phone').value;
            const bio = document.getElementById('bio').value;
            
            const user = Storage.get('user');
            try {
                await apiClient.updateUser(user.id, {
                    phone,
                    bio
                });
                Toast.success('Profile updated successfully');
            } catch (error) {
                Toast.error('Failed to update profile: ' + error.message);
            }
        }

        async function changePassword() {
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                Toast.error('Passwords do not match');
                return;
            }

            const user = Storage.get('user');
            try {
                await apiClient.put(`/users/${user.id}/password`, {
                    old_password: oldPassword,
                    new_password: newPassword
                });
                Toast.success('Password changed successfully');
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } catch (error) {
                Toast.error('Failed to change password: ' + error.message);
            }
        }

        function savePreferences() {
            Toast.success('Preferences saved');
        }

        function saveProfileChanges() {
            updateProfile();
        }

        // Initialize
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadProfile);
        } else {
            loadProfile();
        }
    </script>
</body>
</html>
