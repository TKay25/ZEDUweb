<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ZEDU - Educational Platform{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        main {
            flex: 1;
        }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .navbar-brand { font-weight: 600; }
        footer { border-top: 1px solid #dee2e6; }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="fas fa-graduation-cap"></i> ZEDU</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/courses">Courses</a></li>
                    <li class="nav-item"><a class="nav-link" href="/tutors">Tutors</a></li>
                    <li class="nav-item dropdown" id="userMenu" style="display:none;">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i> Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/dashboard">Dashboard</a></li>
                            <li><a class="dropdown-item" href="/profile">Profile</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                    <li class="nav-item" id="authMenu">
                        <a class="nav-link btn btn-light btn-sm ms-2" href="/login">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-5 text-center">
        <p class="mb-0">&copy; 2026 ZEDU. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = '/api';
        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('access_token');
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (token) options.headers['Authorization'] = `Bearer ${token}`;
            if (data) options.body = JSON.stringify(data);
            const response = await fetch(API_BASE_URL + endpoint, options);
            if (!response.ok && response.status === 401) {
                localStorage.removeItem('access_token');
                window.location.href = '/login';
            }
            return response.json();
        }
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/';
        }
        function isLoggedIn() {
            return localStorage.getItem('access_token') !== null;
        }
        // Update navbar based on login status
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            document.getElementById('userMenu').style.display = token ? 'block' : 'none';
            document.getElementById('authMenu').style.display = token ? 'none' : 'block';
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
