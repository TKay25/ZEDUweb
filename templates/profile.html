{% extends "base.html" %}

{% block title %}Profile - ZEDU{% endblock %}

{% block extra_css %}
<style>
    .profile-form { max-width: 500px; margin: 0 auto; }
    .form-section { background: white; padding: 27px; border-radius: 8px; margin-bottom: 20px; }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-5">My Profile</h1>
    
    <div class="profile-form">
        <!-- Edit Profile -->
        <div class="form-section">
            <h4 class="mb-4">Edit Profile</h4>
            <form id="profileForm">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="firstName" required>
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lastName" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" disabled>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="tel" class="form-control" id="phone">
                </div>
                <button type="submit" class="btn btn-primary w-100">Save Changes</button>
            </form>
        </div>
        
        <!-- Change Password -->
        <div class="form-section">
            <h4 class="mb-4">Change Password</h4>
            <form id="passwordForm">
                <div class="mb-3">
                    <label for="oldPassword" class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="oldPassword" required>
                </div>
                <div class="mb-3">
                    <label for="newPassword" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="newPassword" required>
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" required>
                </div>
                <button type="submit" class="btn btn-warning w-100">Change Password</button>
            </form>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!isLoggedIn()) {
        window.location.href = '/login';
        return;
    }
    // Load profile data if needed
});

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    alert('Profile update feature coming soon!');
});

document.getElementById('passwordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const pwd = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (pwd !== confirm) {
        alert('Passwords do not match!');
        return;
    }
    alert('Password change feature coming soon!');
});
</script>
{% endblock %}
