{% extends "base.html" %}

{% block title %}Dashboard - ZEDU{% endblock %}

{% block extra_css %}
<style>
    :root {
        --deep-blue: #001f5c;
        --blue-dark: #003d9a;
        --blue-accent: #0066cc;
    }
    
    /* Page Background */
    .dashboard-page {
        background: linear-gradient(135deg, var(--deep-blue) 0%, var(--blue-dark) 50%, #1a1a2e 100%);
        min-height: calc(100vh - 80px);
        padding: 45px 18px;
        position: relative;
        overflow: hidden;
    }
    
    .dashboard-page::before {
        content: '';
        position: fixed;
        top: -50%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 102, 204, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        z-index: 0;
    }
    
    .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
    }
    
    /* Header */
    .dashboard-header {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        padding: 40px 30px;
        color: white;
        margin-bottom: 50px;
        animation: slideDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .dashboard-header h1 {
        font-size: 2rem;
        font-weight: 900;
        margin-bottom: 10px;
        letter-spacing: -1px;
    }
    
    .dashboard-header p {
        font-size: 0.88rem;
        opacity: 0.9;
        font-weight: 300;
    }
    
    /* Stats Grid */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 25px;
        margin-bottom: 50px;
    }
    
    .stat-card {
        background: white;
        border: none;
        border-radius: 20px;
        padding: 30px;
        display: flex;
        align-items: center;
        gap: 20px;
        box-shadow: 0 20px 60px rgba(0, 31, 92, 0.3);
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 30px 80px rgba(0, 31, 92, 0.4);
    }
    
    .stat-card:nth-child(1) {
        animation-delay: 0.1s;
    }
    
    .stat-card:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .stat-card:nth-child(3) {
        animation-delay: 0.3s;
    }
    
    .stat-card:nth-child(4) {
        animation-delay: 0.4s;
    }
    
    .stat-icon {
        width: 80px;
        height: 80px;
        border-radius: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        flex-shrink: 0;
    }
    
    .stat-icon.courses {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }
    
    .stat-icon.sessions {
        background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        color: white;
    }
    
    .stat-icon.tasks {
        background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        color: white;
    }
    
    .stat-icon.progress {
        background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        color: white;
    }
    
    .stat-content {
        flex: 1;
    }
    
    .stat-label {
        font-size: 0.68rem;
        color: #666;
        font-weight: 600;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        margin-bottom: 8px;
    }
    
    .stat-value {
        font-size: 1.76rem;
        font-weight: 900;
        color: var(--deep-blue);
        line-height: 1;
    }
    
    /* Learning Progress Card */
    .progress-card {
        background: white;
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 20px 60px rgba(0, 31, 92, 0.3);
        margin-bottom: 50px;
        animation: slideUp 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .progress-title {
        font-size: 1.04rem;
        font-weight: 800;
        color: var(--deep-blue);
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .progress-title i {
        color: var(--blue-accent);
    }
    
    .progress-bar-container {
        background: #e0e0e0;
        border-radius: 15px;
        height: 30px;
        overflow: hidden;
        position: relative;
    }
    
    .progress-bar-fill {
        background: linear-gradient(90deg, var(--blue-accent) 0%, #00d4ff 100%);
        height: 100%;
        width: 0%;
        transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 700;
        font-size: 0.68rem;
    }
    
    /* Quick Actions */
    .quick-actions-section {
        margin-top: 50px;
    }
    
    .section-title {
        font-size: 1.04rem;
        font-weight: 800;
        color: white;
        margin-bottom: 25px;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .section-title i {
        font-size: 1.2rem;
    }
    
    .quick-actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
    }
    
    .action-btn {
        background: white;
        border: none;
        border-radius: 15px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-decoration: none;
        color: var(--deep-blue);
        font-weight: 700;
        box-shadow: 0 10px 30px rgba(0, 31, 92, 0.2);
        animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    .action-btn:nth-child(1) {
        animation-delay: 0.1s;
    }
    
    .action-btn:nth-child(2) {
        animation-delay: 0.2s;
    }
    
    .action-btn:nth-child(3) {
        animation-delay: 0.3s;
    }
    
    .action-btn:hover {
        transform: translateY(-8px);
        box-shadow: 0 20px 50px rgba(0, 31, 92, 0.4);
    }
    
    .action-btn i {
        font-size: 2rem;
        margin-bottom: 12px;
        display: block;
        background: linear-gradient(135deg, var(--blue-accent) 0%, var(--blue-dark) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    
    .action-btn:hover i {
        transform: scale(1.2);
        transition: transform 0.3s ease;
    }
    
    .action-btn span {
        display: block;
        font-size: 0.8rem;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .dashboard-page {
            padding: 25px 12px;
        }
        
        .dashboard-header {
            padding: 25px 20px;
            margin-bottom: 35px;
        }
        
        .dashboard-header h1 {
            font-size: 1.8rem;
        }
        
        .stats-grid {
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }
        
        .stat-card {
            flex-direction: column;
            text-align: center;
            padding: 20px;
        }
        
        .quick-actions-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="dashboard-page">
    <div class="dashboard-container">
        <!-- Header -->
        <div class="dashboard-header">
            <h1><i class="fas fa-tachometer-alt me-3"></i>Welcome Back, <span id="userName">Student</span></h1>
            <p id="userGreeting">Let's continue your learning journey today</p>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <!-- Dynamic stats based on user role -->
        </div>
        
        <!-- Learning Progress Bar (Student Only) -->
        <div class="progress-card" id="progressSection">
            <div class="progress-title">
                <i class="fas fa-chart-line"></i> Overall Progress
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressBar" style="width: 0%;">
                    <span id="progressText">0%</span>
                </div>
            </div>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions-section">
            <div class="section-title">
                <i class="fas fa-bolt"></i> Quick Actions
            </div>
            <div class="quick-actions-grid" id="quickActionsGrid">
                <!-- Dynamic actions based on user role -->
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async function() {
    // Check if logged in
    const token = localStorage.getItem('access_token');
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    // Load user data
    loadDashboard();
});

async function loadDashboard() {
    try {
        const token = localStorage.getItem('access_token');
        const response = await fetch('/api/auth/me', {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error('Failed to load user data');
        }
        
        const result = await response.json();
        const user = result.user;
        const userType = user.user_type.toLowerCase();
        
        // Personalize dashboard
        document.getElementById('userName').textContent = user.first_name || 'User';
        
        // Role-based greeting
        const hour = new Date().getHours();
        let greeting = '';
        if (hour < 12) {
            greeting = '🌅 Good morning!';
        } else if (hour < 18) {
            greeting = '☀️ Good afternoon!';
        } else {
            greeting = '🌙 Good evening!';
        }
        
        // Role-specific greetings
        if (userType === 'student') {
            document.getElementById('userGreeting').textContent = greeting + ' Ready to learn something new?';
        } else if (userType === 'tutor') {
            document.getElementById('userGreeting').textContent = greeting + ' Time to inspire your students!';
        } else if (userType === 'parent') {
            document.getElementById('userGreeting').textContent = greeting + ' Check on your child\'s progress!';
        }
        
        // Render role-specific stats
        renderStatCards(userType, user.id);
        // Render role-specific quick actions
        renderQuickActions(userType);
        
// Render tutor-specific sections if tutor
        if (userType === 'tutor') {
            renderTutorCourses(user.id);
        }
        
    } catch (error) {
        console.error('Error loading dashboard:', error);
    }
}

function renderStatCards(userType, userId) {
    const statsGrid = document.getElementById('statsGrid');
    let statsHTML = '';
    
    if (userType === 'tutor') {
        // Fetch real data from API
        fetchTutorStats(userId, statsGrid);
        return;
    }
    
    const statCards = {
        student: [
            { icon: 'fa-book', label: 'Active Courses', value: 0, id: 'stat1', color: 'courses' },
            { icon: 'fa-video', label: 'Sessions Booked', value: 0, id: 'stat2', color: 'sessions' },
            { icon: 'fa-tasks', label: 'Pending Tasks', value: 0, id: 'stat3', color: 'tasks' },
            { icon: 'fa-chart-pie', label: 'Learning Progress', value: 0, id: 'stat4', color: 'progress' }
        ],
        parent: [
            { icon: 'fa-child', label: 'My Children', value: 0, id: 'stat1', color: 'courses' },
            { icon: 'fa-chart-line', label: 'Avg Progress', value: 0, id: 'stat2', color: 'sessions', suffix: '%' },
            { icon: 'fa-book', label: 'Active Courses', value: 0, id: 'stat3', color: 'tasks' },
            { icon: 'fa-exclamation-circle', label: 'Alerts', value: 0, id: 'stat4', color: 'progress' }
        ]
    };
    
    const cards = statCards[userType] || statCards.student;
    
    cards.forEach((card, index) => {
        statsHTML += `
            <div class="stat-card" style="animation-delay: ${0.1 + index * 0.1}s;">
                <div class="stat-icon ${card.color}">
                    <i class="fas ${card.icon}"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">${card.label}</div>
                    <div class="stat-value">${card.prefix || ''}${card.value}${card.suffix || ''}</div>
                </div>
            </div>
        `;
    });
    
    statsGrid.innerHTML = statsHTML;
}

async function fetchTutorStats(tutorId, statsGrid) {
    try {
        const token = localStorage.getItem('access_token');
        const response = await fetch(`/api/tutors/${tutorId}/dashboard/stats`, {
            method: 'GET',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            }
        });
        
        if (!response.ok) throw new Error('Failed to fetch stats');
        
        const result = await response.json();
        const stats = result.stats;
        
        let statsHTML = `
            <div class="stat-card" style="animation-delay: 0.1s;">
                <div class="stat-icon courses">
                    <i class="fas fa-users"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">Total Students</div>
                    <div class="stat-value">${stats.totalStudents}</div>
                </div>
            </div>
            <div class="stat-card" style="animation-delay: 0.2s;">
                <div class="stat-icon sessions">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">Active Courses</div>
                    <div class="stat-value">${stats.activeCourses}</div>
                </div>
            </div>
            <div class="stat-card" style="animation-delay: 0.3s;">
                <div class="stat-icon tasks">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">Total Earnings</div>
                    <div class="stat-value">$${Math.round(stats.totalEarnings)}</div>
                </div>
            </div>
            <div class="stat-card" style="animation-delay: 0.4s;">
                <div class="stat-icon progress">
                    <i class="fas fa-star"></i>
                </div>
                <div class="stat-content">
                    <div class="stat-label">Average Rating</div>
                    <div class="stat-value">${stats.averageRating}/5</div>
                </div>
            </div>
        `;
        
        statsGrid.innerHTML = statsHTML;
    } catch (error) {
        console.error('Error fetching tutor stats:', error);
        statsGrid.innerHTML = '<div class="stat-card"><p style="color: red;">Failed to load stats</p></div>';
    }
}

function renderQuickActions(userType) {
    const actionsGrid = document.getElementById('quickActionsGrid');
    let actionsHTML = '';
    
    const actions = {
        student: [
            { icon: 'fa-book-open', label: 'Browse Courses', href: '/courses' },
            { icon: 'fa-chalkboard-user', label: 'Find Tutors', href: '/tutors' },
            { icon: 'fa-user-edit', label: 'Edit Profile', href: '/profile' }
        ],
        tutor: [
            { icon: 'fa-book-plus', label: 'Create Course', href: '/courses/new' },
            { icon: 'fa-video', label: 'Start Session', href: '/sessions/new' },
            { icon: 'fa-user-edit', label: 'Edit Profile', href: '/profile' }
        ],
        parent: [
            { icon: 'fa-chart-bar', label: 'View Progress', href: '/children/progress' },
            { icon: 'fa-envelope', label: 'Message Tutors', href: '/messaging' },
            { icon: 'fa-user-edit', label: 'Edit Profile', href: '/profile' }
        ]
    };
    
    const quickActions = actions[userType] || actions.student;
    
    quickActions.forEach((action, index) => {
        actionsHTML += `
            <a href="${action.href}" class="action-btn" style="animation-delay: ${0.1 + index * 0.1}s;">
                <i class="fas ${action.icon}"></i>
                <span>${action.label}</span>
            </a>
        `;
    });
    
    actionsGrid.innerHTML = actionsHTML;
}

// Add tutor-specific section renderer
// Add tutor-specific section renderer
async function renderTutorCourses(tutorId) {
    const dashboardContainer = document.querySelector('.dashboard-container');
    if (!dashboardContainer) return;
    
    try {
        const token = localStorage.getItem('access_token');
        
        // Fetch top courses and recent activities
        const [coursesRes, activitiesRes] = await Promise.all([
            fetch(`/api/tutors/${tutorId}/courses/top`, {
                headers: { 'Authorization': `Bearer ${token}` }
            }),
            fetch(`/api/tutors/${tutorId}/dashboard/recent-activities`, {
                headers: { 'Authorization': `Bearer ${token}` }
            })
        ]);
        
        const coursesData = await coursesRes.json();
        const activitiesData = await activitiesRes.json();
        
        const courses = coursesData.courses || [];
        const activities = activitiesData.activities || [];
        
        let coursesHTML = '';
        courses.forEach(course => {
            coursesHTML += `
                <div class="course-card" style="background: white; border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0, 31, 92, 0.2);">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                        <h3 style="margin: 0; font-size: 0.95rem; font-weight: 700; color: #001f5c;">${course.title}</h3>
                        <span style="color: #ffc107; font-size: 0.9rem;">⭐ ${course.rating}</span>
                    </div>
                    <div style="display: flex; gap: 15px; color: #666; font-size: 0.8rem; margin-bottom: 10px;">
                        <span><i class="fas fa-users"></i> ${course.students} students</span>
                        <span><i class="fas fa-chart-pie"></i> ${course.completionRate}%</span>
                    </div>
                    <div style="font-size: 1.4rem; font-weight: 800; color: #0066cc;">$${Math.round(course.earnings).toLocaleString()} earned</div>
                </div>
            `;
        });
        
        let activitiesHTML = '';
        activities.forEach(activity => {
            let icon = 'fa-file-alt';
            let bgColor = '#e3f2fd';
            let iconColor = '#0066cc';
            
            if (activity.type === 'enrollment') {
                icon = 'fa-user-plus';
                bgColor = '#e8f5e9';
                iconColor = '#4caf50';
            } else if (activity.type === 'question') {
                icon = 'fa-question-circle';
                bgColor = '#fff3e0';
                iconColor = '#ff9800';
            } else if (activity.type === 'review') {
                icon = 'fa-star';
                bgColor = '#f3e5f5';
                iconColor = '#9c27b0';
            }
            
            activitiesHTML += `
                <div style="padding: 20px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; gap: 15px;">
                    <div style="width: 40px; height: 40px; background: ${bgColor}; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: ${iconColor};">
                        <i class="fas ${icon}"></i>
                    </div>
                    <div>
                        <div style="font-weight: 600; color: #001f5c; font-size: 0.9rem;">${activity.title}</div>
                        <div style="font-size: 0.8rem; color: #666;">${activity.description} • ${new Date(activity.timestamp).toLocaleDateString()}</div>
                    </div>
                </div>
            `;
        });
        
        const tutorSection = document.createElement('div');
        tutorSection.innerHTML = `
            <div style="margin-top: 50px;">
                <div class="section-title">
                    <i class="fas fa-fire"></i> Top Performing Courses
                </div>
                <div class="courses-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
                    ${coursesHTML || '<p style="color: #666;">No courses yet</p>'}
                </div>
            </div>
            
            <div style="margin-top: 50px;">
                <div class="section-title">
                    <i class="fas fa-clock"></i> Recent Activity
                </div>
                <div style="background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 31, 92, 0.2);">
                    ${activitiesHTML || '<div style="padding: 20px; color: #666;">No recent activities</div>'}
                </div>
            </div>
        `;
        
        const progressSection = document.getElementById('progressSection');
        if (progressSection) {
            progressSection.style.display = 'none';
        }
        
        const quickActionsSection = document.querySelector('.quick-actions-section');
        if (quickActionsSection) {
            quickActionsSection.parentNode.insertBefore(tutorSection, quickActionsSection.nextSibling);
        }
    } catch (error) {
        console.error('Error rendering tutor courses:', error);
    }
}
</script>
{% endblock %}
