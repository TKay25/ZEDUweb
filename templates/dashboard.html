{% extends "base.html" %}

{% block title %}Dashboard - ZEDU{% endblock %}

{% block extra_css %}
<style>
    .stat-card { border: 0; border-left: 4px solid #0d6efd; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .quick-link { transition: all 0.3s; }
    .quick-link:hover { transform: translateX(5px); }
</style>
{% endblock %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-5">My Dashboard</h1>
    
    <!-- Stats -->
    <div class="row mb-5">
        <div class="col-md-3 mb-4">
            <div class="card stat-card">
                <div class="card-body">
                    <small class="text-muted">Active Courses</small>
                    <div class="stat-value text-primary">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card stat-card">
                <div class="card-body">
                    <small class="text-muted">Sessions Completed</small>
                    <div class="stat-value text-success">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card stat-card">
                <div class="card-body">
                    <small class="text-muted">Pending Tasks</small>
                    <div class="stat-value text-warning">0</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 mb-4">
            <div class="card stat-card">
                <div class="card-body">
                    <small class="text-muted">Learning Progress</small>
                    <div class="stat-value text-info">0%</div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Actions -->
    <div class="row">
        <div class="col-md-6">
            <h4 class="mb-3">Quick Actions</h4>
            <div class="list-group">
                <a href="/courses" class="list-group-item list-group-item-action quick-link">
                    <i class="fas fa-book me-2"></i> Browse Courses
                </a>
                <a href="/tutors" class="list-group-item list-group-item-action quick-link">
                    <i class="fas fa-chalkboard-user me-2"></i> Find Tutors
                </a>
                <a href="/profile" class="list-group-item list-group-item-action quick-link">
                    <i class="fas fa-user me-2"></i> Edit Profile
                </a>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    if (!isLoggedIn()) {
        window.location.href = '/login';
    }
});
</script>
{% endblock %}
