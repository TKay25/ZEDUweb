{% extends "base.html" %}

{% block title %}Login - ZEDU{% endblock %}

{% block extra_css %}
<style>
    :root {
        --deep-blue: #001f5c;
        --blue-dark: #003d9a;
        --blue-accent: #0066cc;
    }
    
    /* Background */
    .login-page {
        background: linear-gradient(135deg, var(--deep-blue) 0%, var(--blue-dark) 50%, #1a1a2e 100%);
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }
    
    .login-page::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 102, 204, 0.1) 0%, transparent 70%);
        border-radius: 50%;
    }
    
    .login-page::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -5%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(0, 61, 154, 0.15) 0%, transparent 70%);
        border-radius: 50%;
    }
    
    .login-container {
        width: 100%;
        max-width: 450px;
        padding: 20px;
        position: relative;
        z-index: 1;
    }
    
    /* Header Before Form */
    .login-header {
        text-align: center;
        margin-bottom: 50px;
        color: white;
    }
    
    .login-header h1 {
        font-size: 2.24rem;
        font-weight: 900;
        margin-bottom: 15px;
        letter-spacing: -1px;
    }
    
    .login-header p {
        font-size: 0.84rem;
        opacity: 0.9;
        font-weight: 300;
    }
    
    /* Card Styling */
    .login-card {
        background: white;
        border: none;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 31, 92, 0.3);
        overflow: hidden;
        animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .login-card .card-body {
        padding: 45px 36px;
    }
    
    /* Form Styling */
    .login-form .mb-3 {
        margin-bottom: 25px !important;
    }
    
    .login-form label {
        font-weight: 700;
        color: var(--deep-blue);
        margin-bottom: 10px;
        font-size: 0.76rem;
        display: block;
        letter-spacing: 0.3px;
    }
    
    .form-control {
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        padding: 13px 16px;
        font-size: 0.8rem;
        transition: all 0.3s ease;
        background: white;
    }
    
    .form-control:focus {
        border-color: var(--blue-accent);
        box-shadow: 0 0 0 0.2rem rgba(0, 102, 204, 0.15);
        background: white;
    }
    
    .form-control::placeholder {
        color: #999;
        font-weight: 500;
    }
    
    .input-icon {
        position: relative;
    }
    
    .input-icon i {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--blue-accent);
        font-size: 1.1rem;
        pointer-events: none;
    }
    
    .input-wrapper {
        position: relative;
    }
    
    /* Checkbox and Links */
    .remember-forgot {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        font-size: 0.72rem;
    }
    
    .form-check {
        margin: 0;
    }
    
    .form-check-input {
        width: 20px;
        height: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .form-check-input:checked {
        background-color: var(--blue-accent);
        border-color: var(--blue-accent);
    }
    
    .form-check-label {
        cursor: pointer;
        margin-left: 8px;
        color: #555;
        font-weight: 600;
    }
    
    .forgot-password {
        color: var(--blue-accent);
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
    }
    
    .forgot-password:hover {
        color: var(--blue-dark);
    }
    
    /* Button */
    .btn-login {
        background: linear-gradient(135deg, var(--blue-accent) 0%, var(--blue-dark) 100%);
        border: none;
        color: white;
        font-weight: 800;
        padding: 13px 27px;
        border-radius: 12px;
        font-size: 0.84rem;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
        letter-spacing: 0.5px;
    }
    
    .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(0, 102, 204, 0.4);
        background: linear-gradient(135deg, var(--blue-dark) 0%, var(--deep-blue) 100%);
        color: white;
    }
    
    .btn-login:active {
        transform: translateY(-1px);
    }
    
    /* Register Link */
    .register-section {
        text-align: center;
        margin-top: 30px;
        padding-top: 22.5px;
        border-top: 1px solid #f0f0f0;
    }
    
    .register-section p {
        margin: 0;
        color: #666;
        font-weight: 500;
    }
    
    .register-link {
        color: var(--blue-accent);
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
    }
    
    .register-link:hover {
        color: var(--blue-dark);
    }
    
    /* Loading State */
    .btn-login.loading {
        opacity: 0.7;
        pointer-events: none;
    }
    
    /* Alert */
    .alert-message {
        border-radius: 12px;
        border: none;
        margin-bottom: 25px;
        display: none;
        animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .alert-message.show {
        display: block;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .login-page {
            min-height: calc(100vh - 60px);
        }
        
        .login-header h1 {
            font-size: 1.76rem;
        }
        
        .login-card .card-body {
            padding: 35px 25px;
        }
        
        .remember-forgot {
            flex-direction: column;
            align-items: flex-start;
            gap: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-graduation-cap"></i> ZEDU</h1>
            <p>Welcome back! Login to continue learning</p>
        </div>
        
        <div class="card login-card">
            <div class="card-body">
                <div class="alert alert-danger alert-message" id="errorAlert" role="alert"></div>
                
                <form id="loginForm" class="login-form">
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    
                    <div class="remember-forgot">
                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="rememberMe"
                            >
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-login w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Login
                    </button>
                </form>
                
                <div class="register-section">
                    <p>Don't have an account? <a href="/register" class="register-link">Sign up here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button[type="submit"]');
        const errorAlert = document.getElementById('errorAlert');
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Clear previous error
        errorAlert.classList.remove('show');
        
        // Show loading state
        btn.classList.add('loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Logging in...';
        
        try {
            const result = await apiCall('/auth/login', 'POST', { email, password });
            
            if (result.access_token) {
                localStorage.setItem('access_token', result.access_token);
                window.location.href = '/dashboard';
            } else {
                throw new Error(result.message || 'Login failed');
            }
        } catch (error) {
            errorAlert.textContent = '❌ ' + (error.message || 'Invalid email or password. Please try again.');
            errorAlert.classList.add('show');
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-sign-in-alt me-2"></i>Login';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
