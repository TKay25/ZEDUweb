{% extends "base.html" %}

{% block title %}Register - ZEDU{% endblock %}

{% block extra_css %}
<style>
    :root {
        --deep-blue: #001f5c;
        --blue-dark: #003d9a;
        --blue-accent: #0066cc;
    }
    
    /* Background */
    .register-page {
        background: linear-gradient(135deg, var(--deep-blue) 0%, var(--blue-dark) 50%, #1a1a2e 100%);
        min-height: calc(100vh - 80px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        padding: 40px 20px;
    }
    
    .register-page::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 102, 204, 0.1) 0%, transparent 70%);
        border-radius: 50%;
    }
    
    .register-page::after {
        content: '';
        position: absolute;
        bottom: -20%;
        left: -5%;
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, rgba(0, 61, 154, 0.15) 0%, transparent 70%);
        border-radius: 50%;
    }
    
    .register-container {
        width: 100%;
        max-width: 500px;
        position: relative;
        z-index: 1;
    }
    
    /* Header Before Form */
    .register-header {
        text-align: center;
        margin-bottom: 50px;
        color: white;
    }
    
    .register-header h1 {
        font-size: 2.8rem;
        font-weight: 900;
        margin-bottom: 15px;
        letter-spacing: -1px;
    }
    
    .register-header p {
        font-size: 1.05rem;
        opacity: 0.9;
        font-weight: 300;
    }
    
    /* Card Styling */
    .register-card {
        background: white;
        border: none;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 31, 92, 0.3);
        overflow: hidden;
        animation: slideUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    
    @keyframes slideUp {
        from {
            opacity: 0;
            transform: translateY(40px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .register-card .card-body {
        padding: 50px 40px;
    }
    
    /* Form Styling */
    .register-form .mb-3 {
        margin-bottom: 22px !important;
    }
    
    .register-form label {
        font-weight: 700;
        color: var(--deep-blue);
        margin-bottom: 10px;
        font-size: 0.95rem;
        display: block;
        letter-spacing: 0.3px;
    }
    
    .form-control,
    .form-select {
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        padding: 14px 18px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: white;
    }
    
    .form-control:focus,
    .form-select:focus {
        border-color: var(--blue-accent);
        box-shadow: 0 0 0 0.2rem rgba(0, 102, 204, 0.15);
        background: white;
    }
    
    .form-control::placeholder {
        color: #999;
        font-weight: 500;
    }
    
    /* Form Row */
    .form-row .form-control {
        width: 100%;
    }
    
    /* Checkbox and Terms */
    .terms-section {
        margin: 30px 0;
        padding: 20px;
        background: #f8f9fc;
        border-radius: 12px;
        border-left: 4px solid var(--blue-accent);
    }
    
    .form-check {
        margin: 0;
    }
    
    .form-check-input {
        width: 20px;
        height: 20px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 4px;
    }
    
    .form-check-input:checked {
        background-color: var(--blue-accent);
        border-color: var(--blue-accent);
    }
    
    .form-check-label {
        cursor: pointer;
        margin-left: 8px;
        color: #555;
        font-weight: 600;
        font-size: 0.9rem;
    }
    
    .terms-link {
        color: var(--blue-accent);
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
    }
    
    .terms-link:hover {
        color: var(--blue-dark);
    }
    
    /* Button */
    .btn-register {
        background: linear-gradient(135deg, var(--blue-accent) 0%, var(--blue-dark) 100%);
        border: none;
        color: white;
        font-weight: 800;
        padding: 14px 30px;
        border-radius: 12px;
        font-size: 1.05rem;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow: 0 8px 20px rgba(0, 102, 204, 0.3);
        letter-spacing: 0.5px;
    }
    
    .btn-register:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(0, 102, 204, 0.4);
        background: linear-gradient(135deg, var(--blue-dark) 0%, var(--deep-blue) 100%);
        color: white;
    }
    
    .btn-register:active {
        transform: translateY(-1px);
    }
    
    /* Login Link */
    .login-section {
        text-align: center;
        margin-top: 30px;
        padding-top: 25px;
        border-top: 1px solid #f0f0f0;
    }
    
    .login-section p {
        margin: 0;
        color: #666;
        font-weight: 500;
    }
    
    .login-link {
        color: var(--blue-accent);
        text-decoration: none;
        font-weight: 700;
        transition: all 0.3s ease;
    }
    
    .login-link:hover {
        color: var(--blue-dark);
    }
    
    /* Loading State */
    .btn-register.loading {
        opacity: 0.7;
        pointer-events: none;
    }
    
    /* Alert */
    .alert-message {
        border-radius: 12px;
        border: none;
        margin-bottom: 25px;
        display: none;
        animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    .alert-message.show {
        display: block;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
        .register-page {
            min-height: calc(100vh - 60px);
            padding: 30px 15px;
        }
        
        .register-header h1 {
            font-size: 2.2rem;
        }
        
        .register-card .card-body {
            padding: 35px 25px;
        }
        
        .terms-section {
            padding: 15px;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="register-page">
    <div class="register-container">
        <div class="register-header">
            <h1><i class="fas fa-graduation-cap"></i> ZEDU</h1>
            <p>Create your account and start learning today</p>
        </div>
        
        <div class="card register-card">
            <div class="card-body">
                <div class="alert alert-danger alert-message" id="errorAlert" role="alert"></div>
                
                <form id="registerForm" class="register-form">
                    <!-- Name Row -->
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="firstName" class="form-label">
                                <i class="fas fa-user me-2"></i>First Name
                            </label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="firstName" 
                                placeholder="John" 
                                required
                            >
                        </div>
                        <div class="col-md-6">
                            <label for="lastName" class="form-label">Last Name</label>
                            <input 
                                type="text" 
                                class="form-control" 
                                id="lastName" 
                                placeholder="Doe" 
                                required
                            >
                        </div>
                    </div>
                    
                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope me-2"></i>Email Address
                        </label>
                        <input 
                            type="email" 
                            class="form-control" 
                            id="email" 
                            placeholder="your@email.com" 
                            required
                        >
                    </div>
                    
                    <!-- User Type -->
                    <div class="mb-3">
                        <label for="userType" class="form-label">
                            <i class="fas fa-briefcase me-2"></i>I am a
                        </label>
                        <select class="form-select" id="userType" required>
                            <option value="">Select your role...</option>
                            <option value="student">👨‍🎓 Student</option>
                            <option value="tutor">👨‍🏫 Tutor</option>
                            <option value="parent">👨‍👩‍👧 Parent</option>
                        </select>
                    </div>
                    
                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2"></i>Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="password" 
                            placeholder="••••••••" 
                            required
                        >
                        <small class="text-muted d-block mt-2">At least 8 characters with numbers and special characters</small>
                    </div>
                    
                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label for="confirmPassword" class="form-label">
                            <i class="fas fa-check-circle me-2"></i>Confirm Password
                        </label>
                        <input 
                            type="password" 
                            class="form-control" 
                            id="confirmPassword" 
                            placeholder="••••••••" 
                            required
                        >
                    </div>
                    
                    <!-- Terms -->
                    <div class="terms-section">
                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="termsAgree" 
                                required
                            >
                            <label class="form-check-label" for="termsAgree">
                                I agree to the <a href="#" class="terms-link">Terms of Service</a> and <a href="#" class="terms-link">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-register w-100 mb-3">
                        <i class="fas fa-user-plus me-2"></i>Create Account
                    </button>
                </form>
                
                <div class="login-section">
                    <p>Already have an account? <a href="/login" class="login-link">Sign in here</a></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = e.target.querySelector('button[type="submit"]');
        const errorAlert = document.getElementById('errorAlert');
        const pwd = document.getElementById('password').value;
        const confirm = document.getElementById('confirmPassword').value;
        
        // Clear previous error
        errorAlert.classList.remove('show');
        
        // Validate passwords match
        if (pwd !== confirm) {
            errorAlert.textContent = '❌ Passwords do not match!';
            errorAlert.classList.add('show');
            return;
        }
        
        // Validate password strength
        if (pwd.length < 8) {
            errorAlert.textContent = '❌ Password must be at least 8 characters long.';
            errorAlert.classList.add('show');
            return;
        }
        
        // Show loading state
        btn.classList.add('loading');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Creating account...';
        
        try {
            const result = await apiCall('/auth/register', 'POST', {
                email: document.getElementById('email').value,
                password: pwd,
                first_name: document.getElementById('firstName').value,
                last_name: document.getElementById('lastName').value,
                user_type: document.getElementById('userType').value
            });
            
            if (result.user) {
                window.location.href = '/login?success=registered';
            } else {
                throw new Error(result.message || 'Registration failed');
            }
        } catch (error) {
            errorAlert.textContent = '❌ ' + (error.message || 'Registration failed. Please try again.');
            errorAlert.classList.add('show');
            btn.classList.remove('loading');
            btn.innerHTML = '<i class="fas fa-user-plus me-2"></i>Create Account';
            btn.disabled = false;
        }
    });
</script>
{% endblock %}
