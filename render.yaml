services:
  - type: web
    name: zedu-backend
    runtime: docker
    region: oregon
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zedu-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

databases:
  - name: zedu-db
    engine: postgres
    region: oregon
    plan: free
