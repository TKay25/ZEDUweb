services:
  - type: web
    name: zedu-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && flask db upgrade
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: zedu-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true

  - type: web
    name: zedu-frontend
    env: static
    region: oregon
    plan: free
    staticPublishPath: .
    buildCommand: echo "No build needed"

databases:
  - name: zedu-db
    engine: postgres
    region: oregon
    plan: free
